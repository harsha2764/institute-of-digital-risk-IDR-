<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Isometric Cube -->
  <g transform="translate(50, 50)">
    <!-- Top Face (Orange) -->
    <path d="M 0 -40 L 34.64 -20 L 0 0 L -34.64 -20 Z" fill="#FF5722" />
    <!-- Left Face (Dark Grey) -->
    <path d="M -34.64 -20 L 0 0 L 0 40 L -34.64 20 Z" fill="#333333" />
    <!-- Right Face (Black) -->
    <path d="M 0 0 L 34.64 -20 L 34.64 20 L 0 40 Z" fill="#000000" />
    
    <!-- Inner lines to suggest structure/resilience -->
    <path d="M 0 0 L 0 40" stroke="#FFFFFF" stroke-width="2" />
    <path d="M 0 0 L -34.64 -20" stroke="#FFFFFF" stroke-width="2" />
    <path d="M 0 0 L 34.64 -20" stroke="#FFFFFF" stroke-width="2" />
  </g>
</svg>
